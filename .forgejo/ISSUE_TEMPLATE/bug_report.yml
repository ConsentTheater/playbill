name: Library bug report
description: The matcher, scorer, types, or another code-level behaviour is broken
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug in the library code.

        **If the issue is about catalogue data** (wrong company, missing cookie,
        incorrect severity), please use the "Tracker catalogue correction"
        template instead.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the problem.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: Code snippet, inputs, or commands that reproduce the issue.
      render: ts
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: "@consenttheater/playbill version"
      placeholder: "0.1.2"
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "22.x / 24.x"

  - type: input
    id: consumer
    attributes:
      label: How are you consuming the package?
      placeholder: "Astro website / browser extension / Node CLI / other"

  - type: textarea
    id: more
    attributes:
      label: Additional context, stack traces